<main>
  <app-content-header
    title="Vendas"
    subtitle="Gestão e consulta de vendas de veículos"
    [showIconOnly]="true"
    [showAddBadge]="true"
    fontIcon="sell"
    (onClick)="goToNewVenda()"
  >
    <div class="search-container">
      <mat-form-field
        appearance="outline"
        class="search-field"
      >
        <mat-label>Pesquisar</mat-label>
        <input
          matInput
          placeholder="Busque por Comprador ou Placa..."
          [(ngModel)]="searchValue"
          (input)="onSearch($event)"
        />
        <mat-icon matPrefix>search</mat-icon>
        <button
          *ngIf="searchValue"
          matSuffix
          mat-icon-button
          aria-label="Limpar"
          (click)="searchValue = ''; loadVendasList()"
        >
          <mat-icon>close</mat-icon>
        </button>
      </mat-form-field>
    </div>
  </app-content-header>

  <div class="premium-filter-bar">
    <mat-button-toggle-group
      [(ngModel)]="selectedStatus"
      (change)="onStatusChange($event.value)"
      class="status-toggle-group"
    >
      <mat-button-toggle value="TODOS">
        <div class="toggle-content">
          <mat-icon>apps</mat-icon>
          <span>Tudo</span>
        </div>
      </mat-button-toggle>
      <mat-button-toggle value="ATIVA">
        <div class="toggle-content">
          <mat-icon class="icon-ativa">check_circle</mat-icon>
          <span>Ativa</span>
        </div>
      </mat-button-toggle>
      <mat-button-toggle value="CANCELADA">
        <div class="toggle-content">
          <mat-icon class="icon-cancelada">cancel</mat-icon>
          <span>Cancelada</span>
        </div>
      </mat-button-toggle>
      <mat-button-toggle value="TRANSFERENCIA">
        <div class="toggle-content">
          <mat-icon class="icon-transferencia">swap_horiz</mat-icon>
          <span>Transferência</span>
        </div>
      </mat-button-toggle>
    </mat-button-toggle-group>
  </div>

  @if (vendasPaginatedList?.page?.totalElements) {
    <app-generic-table
      [genericPaginatedList]="vendasPaginatedList"
      [columns]="columns"
      [totalElements]="vendasPaginatedList!.page.totalElements"
      [loading]="vendasListLoading()"
      [pageSizeOptions]="[5, 10, 25, 50]"
      (rowClick)="onRowClick($event)"
      (editClick)="handleEdit($event)"
      (nfeClick)="handleEmitirNfe($event)"
      (deleteClick)="handleDelete($event)"
      (pageEvent)="handlePageEvent($event)"
    ></app-generic-table>
  } @else {
    @if (vendasListLoading()) {
      <div class="loader-div">
        <span class="loader"></span>
      </div>
    } @else {
      <br />
      <h2 style="padding: 24px">Não há vendas cadastradas</h2>
    }
  }
</main>
