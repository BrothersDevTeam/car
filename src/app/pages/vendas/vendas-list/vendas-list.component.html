<app-content-header title="Vendas" subtitle="Gestão e consulta de vendas de veículos">
    <button mat-flat-button color="primary" (click)="goToNewVenda()">
        <mat-icon>add</mat-icon>
        Registrar Venda
    </button>
</app-content-header>

<div class="vendas-container">
    <!-- Barra de Ferramentas / Filtros -->
    <div class="filters-bar">
        <mat-form-field appearance="outline" class="search-field">
            <mat-label>Pesquisar</mat-label>
            <input matInput placeholder="Busque por Comprador ou Placa..." [(ngModel)]="searchValue" (input)="onSearch($event)">
            <mat-icon matPrefix>search</mat-icon>
            <button *ngIf="searchValue" matSuffix mat-icon-button aria-label="Limpar" (click)="searchValue=''; loadVendasList()">
                <mat-icon>close</mat-icon>
            </button>
        </mat-form-field>
    </div>

    <!-- Tabela Genérica -->
    <div class="table-card mat-elevation-z2">
        <app-generic-table
            [data]="vendasPaginatedList?.content || []"
            [columns]="columns"
            [loading]="vendasListLoading()"
            (rowClick)="onRowClick($event)"
            (edit)="handleEdit($event)"
            (delete)="handleDelete($event)">
        </app-generic-table>

        <!-- Paginação -->
        <mat-paginator
            [length]="vendasPaginatedList?.totalElements || 0"
            [pageSize]="paginationConfig.pageSize"
            [pageIndex]="paginationConfig.pageIndex"
            [pageSizeOptions]="[5, 10, 25, 50]"
            (page)="handlePageEvent($event)"
            aria-label="Selecionar página de vendas">
        </mat-paginator>
    </div>
</div>
