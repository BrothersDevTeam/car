<main class="login-container">
  <div class="content">
    <div class="left-panel">
      <h1>
        C. A. R.
        <br />
      </h1>
      <div class="footer-text">
        <p>Bem-vindo de volta!</p>
        <h2>CONTROLE AUTO REVENDA</h2>
      </div>
    </div>

    <section class="glass-card">
      <!-- LOGIN FORM -->
      <ng-container *ngIf="isLogin()">
        <form [formGroup]="loginForm" (keydown.enter)="submit()">
          <div class="input-group">
            <app-primary-input
              formControlName="email"
              inputName="email"
              type="text"
              placeholder="E-MAIL"
              [uppercase]="false"
            >
              <mat-icon>mail_outline</mat-icon>
            </app-primary-input>
          </div>

          <div class="input-group">
            <app-primary-input
              formControlName="password"
              inputName="password"
              [type]="passwordVisible() ? 'text' : 'password'"
              placeholder="SENHA"
              [uppercase]="false"
            >
              <mat-icon (click)="togglePasswordVisibility()" style="cursor: pointer">
                {{ passwordVisible() ? 'visibility' : 'visibility_off' }}
              </mat-icon>
            </app-primary-input>
          </div>

          <button class="login-btn" (click)="submit()" [disabled]="!disablePrimaryBtn" type="button">
            E N T R A R
          </button>

          <div class="form-footer" style="flex-direction: column; align-items: flex-end; gap: 5px">
            <!-- Removed checkbox as per my understanding it wasn't requested or functional yet, or I can keep it but adjust layout -->
            <div
              style="
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 5px;
              "
            >
              <label class="checkbox-container">
                <input type="checkbox" />
                <span class="checkmark"></span>
                Lembre-me
              </label>
              <a class="forgot-password" (click)="setViewState('FORGOT_PASSWORD')" style="cursor: pointer">
                Recuperar Acesso
              </a>
            </div>
          </div>

          <button class="signup-btn" type="button">CADASTRE-SE</button>
        </form>
      </ng-container>

      <!-- FORGOT PASSWORD FORM -->
      <ng-container *ngIf="isForgotPassword()">
        <form [formGroup]="forgotPasswordForm" (keydown.enter)="submitForgotPassword()">
          <div style="margin-bottom: 20px; text-align: center">
            <h2 style="color: white; font-family: 'Nasalization', sans-serif; font-weight: 300">Recuperar Senha</h2>
            <p style="color: rgba(255, 255, 255, 0.7); font-size: 0.9rem">
              Digite seu email para receber o link de recuperação.
            </p>
          </div>

          <div class="input-group">
            <app-primary-input
              formControlName="email"
              inputName="email"
              type="email"
              placeholder="SEU EMAIL"
              [uppercase]="false"
            >
              <mat-icon>email</mat-icon>
            </app-primary-input>
          </div>

          <button class="login-btn" (click)="submitForgotPassword()" type="button">ENVIAR</button>

          <div class="form-footer" style="justify-content: center; margin-top: 20px">
            <a class="forgot-password" (click)="setViewState('LOGIN')" style="cursor: pointer">Voltar</a>
          </div>
        </form>
      </ng-container>
    </section>
  </div>
</main>
