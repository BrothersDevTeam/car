<div
  class="confirm-dialog-container"
  [ngClass]="data.type || 'primary'"
>
  <div
    class="dialog-header"
    *ngIf="data.icon"
  >
    <div class="icon-circle">
      <mat-icon>{{ data.icon }}</mat-icon>
    </div>
  </div>

  <h2 mat-dialog-title>{{ data.title }}</h2>

  <mat-dialog-content>
    <p [innerHTML]="safeMessage"></p>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button
      mat-button
      mat-dialog-close
      class="cancel-btn"
    >
      {{ data.cancelText }}
    </button>
    <button
      mat-flat-button
      [mat-dialog-close]="true"
      class="confirm-btn"
    >
      {{ data.confirmText }}
    </button>
  </mat-dialog-actions>
</div>
